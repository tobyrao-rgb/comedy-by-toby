<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comedy by Toby</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#d4900a;--cream:#f0ede6;--muted:#8a8070;--bg:#0a0a0a;--card:#141414;--border:#2a2418}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;line-height:1.7;overflow-x:hidden}

/* NAV */
.site-header{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(10,10,10,0.95);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.07)}
.header-brand{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--cream);text-decoration:none}
.header-brand span{color:var(--gold);font-style:italic}
.header-nav{display:flex;align-items:center;gap:2rem}
.header-nav a{color:#ffffff;text-decoration:none;font-size:0.88rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase}
.header-nav a:hover{color:var(--gold)}
.nav-book{background:var(--gold);color:#0a0a0a!important;padding:0.55rem 1.3rem;border-radius:5px;font-weight:700}
.nav-book:hover{background:#c4820a}

/* HERO */
.hero-section{min-height:100vh;padding-top:72px;display:flex;align-items:stretch;background:var(--bg)}
.hero-inner{display:flex;flex-direction:row;align-items:center;width:100%;max-width:1400px;margin:0 auto;padding:0 6%;gap:4rem}
.hero-left{flex:1;display:flex;flex-direction:column;align-items:flex-start;padding:3rem 0}
.hero-logo{width:150px;height:auto;margin-bottom:32px;display:block}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(3rem,5.5vw,5.5rem);font-weight:700;color:var(--cream);line-height:1.0;margin-bottom:36px}
.hero-title em{color:var(--gold);font-style:italic;display:block}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 48px;margin-bottom:48px}
.hero-grid-item{color:#e0e0e0;font-size:1rem;font-weight:300;line-height:1.8;padding-left:1.4rem;position:relative}
.hero-grid-item::before{content:"—";position:absolute;left:0;color:var(--gold);font-weight:700}
.hero-ctas{display:flex;align-items:center;gap:2rem}
.btn-primary{background:var(--gold);color:#0a0a0a;padding:1rem 2.2rem;font-size:0.9rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;text-decoration:none;border-radius:5px;transition:background 0.2s;white-space:nowrap}
.btn-primary:hover{background:#c4820a}
.btn-ghost{color:var(--cream);text-decoration:none;font-size:0.9rem;font-weight:500;border-bottom:1px solid rgba(240,237,230,0.3);padding-bottom:2px;transition:all 0.2s;white-space:nowrap}
.btn-ghost:hover{color:var(--gold);border-color:var(--gold)}
.hero-right{flex:1;display:flex;align-items:flex-end;justify-content:center;min-height:80vh}
.hero-photo{width:100%;max-width:560px;height:auto;object-fit:contain;object-position:bottom;mask-image:linear-gradient(to bottom,black 55%,transparent 100%),linear-gradient(to right,transparent 0%,black 12%,black 88%,transparent 100%);mask-composite:intersect;-webkit-mask-image:linear-gradient(to bottom,black 55%,transparent 100%),linear-gradient(to right,transparent 0%,black 12%,black 88%,transparent 100%);-webkit-mask-composite:destination-in}

/* MOBILE */
@media(max-width:768px){
  .site-header{padding:16px 5%}
  .header-brand{font-size:1.1rem}
  .header-nav a:not(.nav-book){display:none}
  .hero-section{padding-top:64px}
  .hero-inner{flex-direction:column;padding:1.5rem 5% 0;gap:0}
  .hero-left{align-items:center;text-align:center;padding:2rem 0 1.5rem;width:100%}
  .hero-logo{width:130px;margin-bottom:24px}
  .hero-title{font-size:clamp(2.6rem,10vw,3.5rem);margin-bottom:28px;text-align:center}
  .hero-grid{grid-template-columns:1fr;gap:10px;margin-bottom:32px;width:100%;max-width:260px}
  .hero-grid-item{text-align:left}
  .hero-ctas{flex-direction:column;align-items:center;width:100%;gap:1rem}
  .btn-primary{width:100%;max-width:300px;text-align:center}
  .hero-right{width:100%;min-height:50vh;align-items:flex-end}
  .hero-photo{width:100%;max-width:100%;object-position:top center}
}
@media(max-width:420px){
  .hero-title{font-size:2.4rem}
  .hero-logo{width:110px}
}
</style>
</head>
<body>

<header class="site-header">
  <a href="#" class="header-brand">Comedy <span>by Toby.</span></a>
  <nav class="header-nav">
    <a href="#story">STORY</a>
    <a href="#packages">PACKAGES</a>
    <a href="#shows">SHOWS</a>
    <a href="#book" class="nav-book">BOOK NOW</a>
  </nav>
</header>

<section class="hero-section" id="hero">
  <div class="hero-inner">
    <div class="hero-left">
      <img src="logo.png" alt="Comedy by Toby" class="hero-logo">
      <h1 class="hero-title">Comedy<em>by Toby.</em></h1>
      <div class="hero-grid">
        <div class="hero-grid-item">Private Events</div>
        <div class="hero-grid-item">Corporate Shows</div>
        <div class="hero-grid-item">Sangeet</div>
        <div class="hero-grid-item">Stage Events</div>
        <div class="hero-grid-item">Bachelor/Bachelorette</div>
        <div class="hero-grid-item">Live Stand-Up</div>
      </div>
      <div class="hero-ctas">
        <a href="#book" class="btn-primary">Book Your Event</a>
        <a href="#packages" class="btn-ghost">View Packages ↓</a>
      </div>
    </div>
    <div class="hero-right">
      <img src="photo.png" alt="Toby performing standup comedy" class="hero-photo">
    </div>
  </div>
</section>



<script>
(function(){
  const SHEET_ID = "1N9hv6Zl4HNXuYVfaGswy3rd33xyXbue6TaKoq2EasTg";
  const GID = "908817405";
  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

  fetch(CSV_URL)
    .then(r => r.text())
    .then(csv => {
      const lines = csv.trim().split('\n');
      // find header row
      let headerIdx = lines.findIndex(l => l.toLowerCase().includes('name'));
      if (headerIdx === -1) headerIdx = 0;
      const rows = lines.slice(headerIdx + 1);

      const cards = [];
      rows.forEach(line => {
        // Handle quoted CSV fields properly
        const cols = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          if (line[i] === '"') {
            inQuotes = !inQuotes;
          } else if (line[i] === ',' && !inQuotes) {
            cols.push(current.trim());
            current = '';
          } else {
            current += line[i];
          }
        }
        cols.push(current.trim());

        const name   = (cols[0] || '').trim();
        const title  = (cols[1] || '').trim();
        const quote  = (cols[2] || '').trim();
        const active = (cols[3] || '').trim().toLowerCase();

        if (!name || !quote || active !== 'yes') return;

        const authorLine = title ? `${name}, ${title}` : name;
        cards.push(`
          <div class="testimonial-card">
            <p class="testimonial-text">"${quote}"</p>
            <p class="testimonial-author">— ${authorLine}</p>
          </div>
        `);
      });

      const grid = document.getElementById('testimonials-grid');
      if (cards.length > 0) {
        grid.innerHTML = cards.join('');
      } else {
        grid.innerHTML = '';
      }
    })
    .catch(() => {
      document.getElementById('testimonials-grid').innerHTML = '';
    });
})();
</script>
<script>
(function(){
  const SHEET_ID = "1N9hv6Zl4HNXuYVfaGswy3rd33xyXbue6TaKoq2EasTg";
  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

  function makeRow(date, name, type) {
    return `<div class="show-row"><span class="show-year">${date}</span><span class="show-name">${name}</span><span class="show-type">${type}</span></div>`;
  }

  fetch(CSV_URL)
    .then(r => r.text())
    .then(csv => {
      const lines = csv.trim().split('\n').map(l => l.split(','));
      // find header row
      let headerIdx = lines.findIndex(r => r.some(c => c.trim().toLowerCase() === 'date'));
      if (headerIdx === -1) headerIdx = 0;
      const rows = lines.slice(headerIdx + 1);

      const upcoming = [];
      const past = [];

      rows.forEach(cols => {
        // cols may have leading empty col
        const offset = cols[0].trim() === '' ? 1 : 0;
        const date   = (cols[offset]   || '').trim();
        const show   = (cols[offset+1] || '').trim();
        const type   = (cols[offset+2] || '').trim();
        const status = (cols[offset+3] || '').trim().toLowerCase();
        if (!show) return;
        if (status === 'upcoming') upcoming.push({date, show, type});
        else past.push({date, show, type});
      });

      // Render upcoming
      if (upcoming.length > 0) {
        document.getElementById('upcoming-section').style.display = 'block';
        document.getElementById('upcoming-list').innerHTML = upcoming.map(s => makeRow(s.date, s.show, s.type)).join('');
      }

      // Render past
      if (past.length > 0) {
        if (upcoming.length > 0) document.getElementById('past-label').style.display = 'block';
        document.getElementById('past-list').innerHTML = past.map(s => makeRow(s.date, s.show, s.type)).join('');
      } else {
        document.getElementById('past-list').innerHTML = '';
      }
    })
    .catch(() => {
      document.getElementById('past-list').innerHTML = '<p style="color:#8a8070;font-size:0.9rem">Could not load shows.</p>';
    });
})();
</script>

</body>
</html>
